apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -c
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: affine-migration
  name: affine-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: affine-migration
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -c
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: affine-migration
    spec:
      containers:
        - args:
            - sh
            - -c
            - node ./scripts/self-host-predeploy.js
          env:
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
            - name: DATABASE_URL
              value: postgresql://affine:affine@postgres:5432/affine
            - name: REDIS_SERVER_HOST
              value: redis
          image: ghcr.io/toeverything/affine:stable
          name: affine-migration-job
          volumeMounts:
            - mountPath: /root/.affine/storage
              name: affine-storage
            - mountPath: /root/.affine/config
              name: affine-config
      restartPolicy: Always
      volumes:
      volumes:
        - name: postgres-data
          nfs:
            server: 192.168.10.3
            path: /volume1/k8s/volumes/affine/postgres-data
        - name: affine-config
          nfs:
            server: 192.168.10.3
            path: /volume1/k8s/volumes/affine/config
        - name: affine-storage
          nfs:
            server: 192.168.10.3
            path: /volume1/k8s/volumes/affine/storage